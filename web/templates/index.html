<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票实时行情 - 成交量Top10</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            color: #8892b0;
            font-size: 14px;
        }

        .update-time {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 15px;
            color: #64ffda;
            font-size: 13px;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .stock-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .stock-info h3 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stock-info .code {
            color: #8892b0;
            font-size: 13px;
        }

        .stock-price {
            text-align: right;
        }

        .stock-price .price {
            font-size: 28px;
            font-weight: 700;
            display: block;
        }

        .stock-price.up .price {
            color: #ef4444;
        }

        .stock-price.down .price {
            color: #22c55e;
        }

        .stock-price.flat .price {
            color: #fff;
        }

        .stock-price .change {
            font-size: 14px;
            margin-top: 4px;
        }

        .stock-price.up .change {
            color: #fca5a5;
        }

        .stock-price.down .change {
            color: #86efac;
        }

        .stock-price.flat .change {
            color: #9ca3af;
        }

        .stock-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-item {
            text-align: center;
        }

        .detail-item .label {
            color: #8892b0;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .detail-item .value {
            color: #e6e6e6;
            font-size: 14px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            color: #8892b0;
            padding: 60px 20px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #64ffda;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 24px;
            }

            .stock-card {
                padding: 20px;
            }

            .stock-price .price {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 股票实时行情</h1>
            <p>昨日成交量 Top 10 股票</p>
            <div class="update-time">
                ⏱️ 数据刷新中...
            </div>
        </div>

        <div class="stock-grid" id="stockContainer">
            <div class="loading">正在加载行情数据</div>
        </div>
    </div>

    <script>
        const stockContainer = document.getElementById('stockContainer');
        const updateTimeEl = document.querySelector('.update-time');

        function formatNumber(num) {
            return parseFloat(num).toFixed(2);
        }

        async function fetchStockData() {
            try {
                const response = await fetch('/api/top_stocks');
                const data = await response.json();
                
                if (data.length === 0) {
                    stockContainer.innerHTML = '<div class="loading">暂无数据</div>';
                    return;
                }

                let html = '';
                data.forEach(stock => {
                    html += `
                        <div class="stock-card">
                            <div class="stock-header">
                                <div class="stock-info">
                                    <h3>${stock.short_name}</h3>
                                    <span class="code">${stock.stock_code}</span>
                                </div>
                                <div class="stock-price ${stock.change_class}">
                                    <span class="price">${stock.price}</span>
                                    <div class="change">
                                        <span>${stock.change}</span>
                                        <span> (${stock.change_pct})</span>
                                    </div>
                                </div>
                            </div>
                            <div class="stock-details">
                                <div class="detail-item">
                                    <div class="label">成交量</div>
                                    <div class="value">${stock.volume}股</div>
                                </div>
                                <div class="detail-item">
                                    <div class="label">成交金额</div>
                                    <div class="value">${stock.amount}元</div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                stockContainer.innerHTML = html;

                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                updateTimeEl.textContent = `⏱️ 最后刷新: ${timeStr}`;

            } catch (error) {
                console.error('获取数据失败:', error);
                stockContainer.innerHTML = '<div class="loading">获取数据失败，正在重试...</div>';
            }
        }

        fetchStockData();

        setInterval(fetchStockData, 5000);
    </script>
</body>
</html>
